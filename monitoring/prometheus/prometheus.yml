global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cryptoflip
    replica: '{{.ExternalURL}}'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cryptoflip-api'
    static_configs:
      - targets: ['api:4000']
    metrics_path: '/metrics'

  - job_name: 'cryptoflip-ws'
    static_configs:
      - targets: ['ws-game:4001']
    metrics_path: '/metrics'

  - job_name: 'cryptoflip-worker'
    static_configs:
      - targets: ['worker:4000']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'
