groups:
  - name: cryptoflip-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 10% for 5 minutes"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 500ms"

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "PostgreSQL connections are above 80"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 90%"

      - alert: ContractBalanceLow
        expr: escrow_contract_balance < 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Contract balance low"
          description: "Smart contract balance is below 10 ETH"

      - alert: FraudScoreSpike
        expr: rate(fraud_events_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Fraud spike detected"
          description: "More than 10 fraud events per minute"
